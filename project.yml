name: MovieTagger
options:
  bundleIdPrefix: com.movietagger
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

targets:
  MovieTagger:
    type: application
    platform: macOS
    sources:
      - path: MovieTagger
        excludes:
          # Never bundle a stray built .app sitting in the source tree — it
          # rides along in Contents/Resources and fails notarization.
          - "MovieTagger.app"
          - "**/*.app"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.movietagger.app
        PRODUCT_NAME: MovieTagger
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: MovieTagger/Info.plist
        CODE_SIGN_ENTITLEMENTS: MovieTagger/MovieTagger.entitlements
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          # Developer ID distribution + notarization (Release/archive only;
          # Debug stays on automatic "Sign to Run Locally" for local builds).
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: "9R236BB67S"
          ENABLE_HARDENED_RUNTIME: YES
